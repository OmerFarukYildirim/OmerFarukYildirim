name: Generate Snake

# İş akışının ne zaman çalışacağını kontrol eder (Her 6 saatte bir ve manuel olarak)
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# ÖNEMLİ: İş akışının 'output' branch'ine dosya yazabilmesi için gereken izin
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repoyu güncel Node.js sürümü ile checkout eder (Node.js uyarısını çözer)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Yılan animasyonunu oluşturur (set-output uyarısını çözer)
      - name: Generate Snake files
        uses: Platane/snk@v3
        with:
          # Kullanıcı adını otomatik olarak repodan alır
          github_user_name: ${{ github.repository_owner }}
          # Çıktı olarak hem SVG (açık/koyu tema) hem de GIF oluşturur
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif

      # Oluşturulan dosyaları 'output' branch'ine push'lar
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
